name: Build Android APK (Debug)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mobile-app/package-lock.json'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          cd mobile-app
          npm ci

      - name: Prebuild Expo App (Generate Android Project)
        run: |
          cd mobile-app
          npx expo prebuild --platform android --no-install

      - name: Patch Android - Allow HTTP cleartext traffic
        run: |
          # 1. Créer le dossier xml et y ajouter le fichier network_security_config.xml
          mkdir -p mobile-app/android/app/src/main/res/xml
          cat << 'EOF' > mobile-app/android/app/src/main/res/xml/network_security_config.xml
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="true">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF

          # 2. Injecter android:networkSecurityConfig et usesCleartextTraffic dans la balise <application>
          sed -i 's/<application/<application android:usesCleartextTraffic="true" android:networkSecurityConfig="@xml\/network_security_config"/g' mobile-app/android/app/src/main/AndroidManifest.xml
          
          echo "✅ Patch HTTP Cleartext appliqué avec succès sur le projet Android Expo"

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile-app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android APK (Gradle)
        run: |
          cd mobile-app/android
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.enableMinifyInReleaseBuilds=true -Pandroid.enableShrinkResourcesInReleaseBuilds=true --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: mobile-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
